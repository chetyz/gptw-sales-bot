# fly.toml app configuration file generated for gptw-sales-bot on 2026-04-30T10:39:00-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gptw-sales-bot'
primary_region = 'iad'

[build]

[env]
  CLAUDE_CODE_DISABLE_AUTOUPDATE = '1'
  GPTW_BOT_PORT = '8787'
  IS_SANDBOX = '1'

[[mounts]]
  source = 'claude_data'
  destination = '/root/.claude'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
